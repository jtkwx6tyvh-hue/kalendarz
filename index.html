<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalendarz Rodzinny</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gosia:         #e07a5f;
    --gosia-pastel:  #f2c4b8;
    --gosia-intense: #b84a2a;
    --gosia-text:    #fff;

    --grzesiek:         #3d405b;
    --grzesiek-pastel:  #a8aac0;
    --grzesiek-intense: #1a1c2e;
    --grzesiek-text:    #fff;

    --adas:         #81b29a;
    --adas-pastel:  #c2ddd1;
    --adas-intense: #3d7a5e;
    --adas-text:    #fff;

    --tymek:         #f2cc8f;
    --tymek-pastel:  #faebc8;
    --tymek-intense: #c8960a;
    --tymek-text:    #5a4a20;

    --bg:       #faf9f6;
    --surface:  #ffffff;
    --border:   #e8e4dc;
    --text:     #2c2c2c;
    --muted:    #9a9590;
    --today-bg: #fff8e7;
    --weekend-bg: #f5f0fb;
    --col-w:    134px;
    --label-w:  44px;
    --row-h:    110px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── HEADER ── */
  header {
    background: var(--grzesiek); color: #fff;
    padding: 6px 12px; display: flex; align-items: center; justify-content: space-between; gap: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15); flex-wrap: wrap;
  }
  header h1 { font-family: 'Playfair Display', serif; font-size: 0.95rem; letter-spacing: 0.02em; white-space: nowrap; }
  .nav-controls { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
  .nav-controls button {
    background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); color: #fff;
    border-radius: 8px; padding: 3px 10px; cursor: pointer; font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem; transition: background 0.2s; white-space: nowrap;
  }
  .nav-controls button:hover { background: rgba(255,255,255,0.28); }
  #period-label { font-family: 'Playfair Display', serif; font-size: 0.85rem; min-width: 120px; text-align: center; }
  .today-btn { font-size: 0.65rem !important; padding: 2px 7px !important; opacity: 0.8; }

  /* view toggle */
  .view-toggle { display: flex; border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; overflow: hidden; }
  .view-toggle button {
    border: none; border-radius: 0; padding: 3px 9px; font-size: 0.7rem;
    background: transparent; border-right: 1px solid rgba(255,255,255,0.2);
  }
  .view-toggle button:last-child { border-right: none; }
  .view-toggle button.active { background: rgba(255,255,255,0.28); font-weight: 600; }

  /* ── CALENDAR WRAP ── */
  .calendar-wrap { padding: 0 0 40px; }

  /* ── MONTH VIEW ── */
  .weekdays {
    display: grid;
    grid-template-columns: var(--label-w) repeat(7, var(--col-w));
    margin-bottom: 2px;
    min-width: calc(var(--label-w) + 7*var(--col-w));
  }
  .weekdays span { text-align: center; font-size: 0.68rem; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; padding: 4px 0; }
  .weekdays span:first-child { position: sticky; left: 0; background: var(--bg); z-index: 4; }
  .cal-grid {
    display: grid;
    grid-template-columns: var(--label-w) repeat(7, var(--col-w));
    grid-auto-rows: auto;
    border-left: 1px solid var(--border); border-top: 1px solid var(--border);
    min-width: calc(var(--label-w) + 7*var(--col-w));
  }

  .row-label {
    border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
    writing-mode: vertical-rl; text-orientation: mixed; transform: rotate(180deg);
    font-size: 0.65rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
    color: #fff; display: flex; align-items: center; justify-content: center;
    padding: 6px 0; min-height: var(--row-h);
  }
  .row-label.gosia    { background: var(--gosia); }
  .row-label.grzesiek { background: var(--grzesiek); }
  .row-label.adas     { background: var(--adas); }
  .row-label.tymek    { background: var(--tymek); color: #5a4a20; }

  .day-cell {
    border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
    padding: 3px 5px 5px; min-height: var(--row-h); cursor: pointer;
    transition: background 0.15s; position: relative;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .day-cell:hover { background: #f0ede6; }
  .day-cell.today  { background: var(--today-bg); }
  .day-cell.weekend { background: var(--weekend-bg); }
  .day-cell.today.weekend { background: var(--today-bg); }
  .day-cell.other-month { background: #f5f3ef; }
  .day-cell.other-month .day-num { color: #ccc; }
  .day-cell.date-row { min-height: 28px; cursor: default; background: var(--surface) !important; display: block; }
  .day-cell.date-row:hover { background: var(--surface) !important; }
  .day-cell.date-row.today { background: var(--today-bg) !important; }

  .day-num { font-size: 0.72rem; font-weight: 500; color: var(--muted); line-height: 1; }
  .day-num.today-num {
    background: var(--gosia); color: #fff; width: 18px; height: 18px;
    border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: 700;
  }

  .chips-top { }
  .chips-bot { margin-top: auto; }

  /* ── CHIPS (shared month+week) ── */
  .event-chip { display: block; border-radius: 4px; padding: 3px 6px; margin-top: 2px; cursor: pointer; max-width: 100%; overflow: hidden; transition: opacity 0.15s; }
  .event-chip:hover { opacity: 0.78; }
  .chip-time  { display: block; font-size: 0.58rem; line-height: 1.2; opacity: 0.88; }
  .chip-title { display: block; font-size: 0.72rem; line-height: 1.3; font-weight: 500; white-space: normal; word-break: break-word; }

  /* Normal */
  .event-chip.gosia,    .week-event.gosia    { background: var(--gosia);         color: var(--gosia-text); }
  .event-chip.grzesiek, .week-event.grzesiek { background: var(--grzesiek);      color: var(--grzesiek-text); }
  .event-chip.adas,     .week-event.adas     { background: var(--adas);          color: var(--adas-text); }
  .event-chip.tymek,    .week-event.tymek    { background: var(--tymek);         color: var(--tymek-text); }
  /* Pastel (multi-day) */
  .event-chip.gosia.pastel,    .week-event.gosia.pastel    { background: var(--gosia-pastel);    color: #7a3820; }
  .event-chip.grzesiek.pastel, .week-event.grzesiek.pastel { background: var(--grzesiek-pastel); color: #2a2c40; }
  .event-chip.adas.pastel,     .week-event.adas.pastel     { background: var(--adas-pastel);     color: #2a5a42; }
  .event-chip.tymek.pastel,    .week-event.tymek.pastel    { background: var(--tymek-pastel);    color: #7a5a10; }
  /* Intense (important) */
  .event-chip.gosia.intense,    .week-event.gosia.intense    { background: var(--gosia-intense);    color: #fff; box-shadow: 0 2px 6px rgba(184,74,42,.4); }
  .event-chip.grzesiek.intense, .week-event.grzesiek.intense { background: var(--grzesiek-intense); color: #fff; box-shadow: 0 2px 6px rgba(26,28,46,.5); }
  .event-chip.adas.intense,     .week-event.adas.intense     { background: var(--adas-intense);     color: #fff; box-shadow: 0 2px 6px rgba(61,122,94,.4); }
  .event-chip.tymek.intense,    .week-event.tymek.intense    { background: var(--tymek-intense);    color: #fff; box-shadow: 0 2px 6px rgba(200,150,10,.4); }

  /* ── WEEK VIEW ── */
  #week-view { display: none; }
  #week-view.visible { display: block; }
  #month-view.hidden { display: none; }

  .week-grid-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; padding: 0; }

  /* Week header row: empty time col + 7 day cols */
  .week-header {
    display: grid;
    grid-template-columns: 48px repeat(7, var(--col-w));
    min-width: calc(48px + 7*var(--col-w));
    border-left: 1px solid var(--border);
    border-top: 1px solid var(--border);
    position: sticky; top: 0; background: var(--surface); z-index: 10;
  }
  .week-header-cell {
    border-right: 1px solid var(--border); border-bottom: 2px solid var(--border);
    padding: 6px 4px; text-align: center;
    font-size: 0.7rem; font-weight: 500; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .week-header-cell .wh-day { font-size: 1.1rem; font-weight: 700; color: var(--text); line-height: 1; }
  .week-header-cell.today-col { background: var(--today-bg); }
  .week-header-cell.today-col .wh-day { color: var(--gosia); }

  /* Each member gets a labelled section */
  .week-member-section { }
  .week-member-label {
    display: grid;
    grid-template-columns: 48px repeat(7, var(--col-w));
    min-width: calc(48px + 7*var(--col-w));
  }
  .week-member-name {
    border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
    writing-mode: vertical-rl; text-orientation: mixed; transform: rotate(180deg);
    font-size: 0.62rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
    color: #fff; display: flex; align-items: center; justify-content: center;
    padding: 4px 0;
  }
  .week-member-name.gosia    { background: var(--gosia); }
  .week-member-name.grzesiek { background: var(--grzesiek); }
  .week-member-name.adas     { background: var(--adas); }
  .week-member-name.tymek    { background: var(--tymek); color: #5a4a20; }

  /* Time slots grid */
  .week-slots {
    display: grid;
    grid-template-columns: 48px repeat(7, var(--col-w));
    min-width: calc(48px + 7*var(--col-w));
    border-left: 1px solid var(--border);
  }
  .week-time-label {
    border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
    font-size: 0.6rem; color: var(--muted); padding: 2px 4px 0 0; text-align: right;
    height: 36px; display: flex; align-items: flex-start; justify-content: flex-end; padding-top: 3px;
  }
  .week-slot {
    border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
    height: 36px; position: relative; cursor: pointer; transition: background 0.12s;
  }
  .week-slot:hover { background: #f0ede6; }
  .week-slot.today-col { background: #fffdf4; }
  .week-slot.today-col:hover { background: #f5efda; }

  /* Events positioned absolutely inside slots */
  .week-event { position: absolute; left: 2px; right: 2px; border-radius: 4px; padding: 2px 5px; cursor: pointer; overflow: hidden; transition: opacity 0.15s; z-index: 2; }
  .week-event.all-members { background: var(--grzesiek); color: #fff; border-left: 4px solid var(--gosia); }
  .week-event.all-members.pastel  { background: var(--grzesiek-pastel); color: #2a2c40; border-left-color: var(--gosia-pastel); box-shadow: none; }
  .week-event.all-members.intense { background: var(--grzesiek-intense); color: #fff; border-left-color: var(--gosia-intense); box-shadow: 0 2px 8px rgba(0,0,0,.3); }
  .week-event:hover { opacity: 0.82; }
  .week-event .chip-time  { font-size: 0.56rem; opacity: 0.9; }
  .week-event .chip-title { font-size: 0.68rem; font-weight: 500; white-space: normal; word-break: break-word; }

  /* all-day strip at top of week view */
  .week-allday {
    display: grid;
    grid-template-columns: 48px repeat(7, var(--col-w));
    min-width: calc(48px + 7*var(--col-w));
    border-left: 1px solid var(--border);
    background: #f7f5f1;
  }
  .week-allday-label {
    border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
    font-size: 0.58rem; color: var(--muted); padding: 4px 3px 4px 0;
    text-align: right; writing-mode: horizontal-tb;
  }
  .week-allday-cell {
    border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
    padding: 2px 3px; min-height: 24px;
  }
  .week-allday-cell.today-col { background: var(--today-bg); }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(44,44,44,0.45);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface); border-radius: 16px; padding: 24px 28px;
    width: 430px; max-width: 96vw; max-height: 92vh; overflow-y: auto;
    box-shadow: 0 16px 48px rgba(0,0,0,0.18); transform: translateY(12px); transition: transform 0.22s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal h2 { font-family: 'Playfair Display', serif; font-size: 1.2rem; margin-bottom: 16px; }

  .field-label { display: block; font-size: 0.74rem; font-weight: 500; margin-bottom: 4px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .modal input[type=text], .modal input[type=date], .modal input[type=time], .modal select, .modal textarea {
    width: 100%; padding: 8px 11px; border: 1.5px solid var(--border); border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-size: 0.9rem; color: var(--text);
    background: var(--bg); margin-bottom: 12px; outline: none; transition: border-color 0.2s;
  }
  .modal input:focus, .modal select:focus, .modal textarea:focus { border-color: var(--grzesiek); }
  .modal textarea { height: 54px; resize: vertical; }

  .person-checks { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .person-check { display: flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: 20px; cursor: pointer; border: 2px solid var(--border); font-size: 0.82rem; font-weight: 500; transition: all 0.15s; user-select: none; }
  .person-check input { display: none; }
  .person-check.checked-gosia    { background: var(--gosia);    border-color: var(--gosia);    color: #fff; }
  .person-check.checked-grzesiek { background: var(--grzesiek); border-color: var(--grzesiek); color: #fff; }
  .person-check.checked-adas     { background: var(--adas);     border-color: var(--adas);     color: #fff; }
  .person-check.checked-tymek    { background: var(--tymek);    border-color: var(--tymek);    color: #5a4a20; }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .two-col > div { display: flex; flex-direction: column; }
  .two-col input, .two-col select { margin-bottom: 0; }

  .rec-toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.86rem; margin-bottom: 10px; }
  .rec-toggle input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--grzesiek); cursor: pointer; }
  .rec-options { display: none; padding: 13px; background: #f5f2ec; border-radius: 10px; margin-bottom: 12px; }
  .rec-options.visible { display: block; }
  .weekday-picks { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px; }
  .wday-btn { padding: 3px 9px; border-radius: 14px; border: 1.5px solid var(--border); font-size: 0.74rem; cursor: pointer; background: var(--bg); transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
  .wday-btn.on { background: var(--grzesiek); border-color: var(--grzesiek); color: #fff; }

  .modal-actions { display: flex; gap: 9px; justify-content: flex-end; margin-top: 6px; }
  .btn { padding: 8px 18px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.86rem; font-weight: 500; cursor: pointer; border: none; transition: background 0.2s, transform 0.1s; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--grzesiek); color: #fff; }
  .btn-primary:hover { background: #2e3148; }
  .btn-danger  { background: #e07a5f; color: #fff; }
  .btn-danger:hover  { background: #c45f44; }
  .btn-ghost   { background: transparent; color: var(--muted); border: 1.5px solid var(--border); }
  .btn-ghost:hover   { background: var(--border); }

  .importance-picks { display: flex; gap: 8px; margin-bottom: 13px; }
  .imp-btn { padding: 6px 16px; border-radius: 20px; border: 2px solid var(--border); background: var(--bg); font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 500; cursor: pointer; transition: all 0.15s; }
  .imp-btn:hover { border-color: var(--grzesiek); }
  .imp-btn.selected[data-imp="normal"]    { background: var(--grzesiek); border-color: var(--grzesiek); color: #fff; }
  .imp-btn.selected[data-imp="important"] { background: var(--gosia-intense); border-color: var(--gosia-intense); color: #fff; }

  .icon-picks { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 13px; }
  .icon-btn {
    width: 36px; height: 36px; border-radius: 8px; border: 2px solid var(--border);
    background: var(--bg); font-size: 1.1rem; cursor: pointer; display: flex;
    align-items: center; justify-content: center; transition: all 0.15s;
    font-family: inherit;
  }
  .icon-btn:hover { border-color: var(--grzesiek); background: #f0ede6; }
  .icon-btn.selected { border-color: var(--grzesiek); background: var(--grzesiek); color: #fff; }

  #preview-overlay { position:fixed;inset:0;background:rgba(44,44,44,0.45);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity 0.2s; }
  #preview-overlay.open { opacity:1;pointer-events:all; }
  #preview-overlay .modal { transform:translateY(12px);transition:transform 0.22s; }
  #preview-overlay.open .modal { transform:translateY(0); }
  .preview-row { display:flex;gap:8px;align-items:flex-start;padding:4px 0;border-bottom:1px solid var(--border); }
  .preview-row:last-child { border-bottom:none; }
  .preview-label { font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;min-width:70px;padding-top:2px; }
  .preview-val { font-size:0.88rem;color:var(--text); }
  .preview-person-dot { display:inline-flex;align-items:center;gap:4px;font-size:0.78rem;font-weight:500;padding:2px 8px;border-radius:12px;color:#fff; }

  /* ── LOCK ── */
  #day-view { display: none; }
  #day-view.visible { display: block; }

  @media (max-width: 640px) {
    /* Header */
    header { padding: 8px 10px; gap: 6px; }
    header h1 { font-size: 0.85rem; }
    .nav-controls { gap: 4px; }
    .view-toggle button { padding: 3px 7px; font-size: 0.65rem; }
    .nav-controls button { padding: 2px 8px; font-size: 0.72rem; }
    #period-label { font-size: 0.8rem; min-width: 0; }

    /* Modal */
    .modal { padding: 16px 12px; }
    .two-col { grid-template-columns: 1fr; }
  }

  /* ── SEARCH ── */
  .search-result {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; cursor: pointer; border-bottom: 1px solid var(--border);
    transition: background 0.12s;
  }
  .search-result:hover { background: #f5f3ef; }
  .search-result:last-child { border-bottom: none; }
  .sr-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .sr-body { flex: 1; min-width: 0; }
  .sr-title { font-size: 0.9rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sr-meta  { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }
  .search-empty { padding: 32px 14px; text-align: center; color: var(--muted); font-size: 0.88rem; }

  /* ── HIGHLIGHT PULSE ── */
  @keyframes ev-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(224,122,95,0.6)} 50%{box-shadow:0 0 0 6px rgba(224,122,95,0)} }
  .ev-highlight { animation: ev-pulse 0.7s ease 2; }
  .dws-cell { flex:1; display:flex; flex-direction:column; align-items:center; gap:1px; cursor:pointer; padding:2px 0; }
  .dws-name { font-size:0.58rem; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; color:var(--muted); }
  .dws-num  { width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center;
              font-size:0.82rem; font-weight:500; color:var(--text); transition:background 0.15s; }
  .dws-cell:hover .dws-num { background:var(--border); }
  .dws-cell.active .dws-num { background:var(--gosia); color:#fff; font-weight:700; }
  .dws-cell.is-today .dws-name { color:var(--gosia); }
  .dws-cell.active.is-today .dws-num { background:var(--gosia); }

  /* Day view swipe container */
  #day-view { touch-action: pan-y; user-select: none; overscroll-behavior-x: none; overflow-x: hidden; }

  /* Day label badge */
  .day-rel-label {
    display: inline-block; font-size: 0.65rem; font-weight: 700;
    letter-spacing: 0.06em; text-transform: uppercase;
    padding: 1px 7px; border-radius: 10px; margin-left: 8px;
    vertical-align: middle;
    background: var(--gosia); color: #fff;
  }
  .day-rel-label.future { background: var(--adas); }
  .day-rel-label.past   { background: var(--muted); }
</style>
</head>
<body>
<!-- APP -->
<div id="app">

<header>
  <h1>📅 Nasz Kalendarz</h1>
  <div class="nav-controls">
    <div class="view-toggle">
      <button id="btn-month" onclick="setView('month')">Miesiąc</button>
      <button id="btn-week"  class="active" onclick="setView('week')">2 dni</button>
      <button id="btn-day"   onclick="setView('day')">Dzień</button>
    </div>
    <button onclick="navigate(-1)">‹</button>
    <span id="period-label"></span>

/* ===== CONFIG ===== */

const MONTH_NAMES = ['Styczeń','Luty','Marzec','Kwiecień','Maj','Czerwiec','Lipiec','Sierpień','Wrzesień','Październik','Listopad','Grudzień'];

// ── GLOBAL STATE (musi być przed Firebase callbackiem) ──
let currentYear, currentMonth, currentWeekMonday, currentDay;

/* ===== FIREBASE STORAGE ===== */
function saveEvents() {

const STATUS_OPTIONS = [
  { val:'',    emoji:'',   label:'Brak' },
  { val:'home', emoji:'🏠', label:'Dom' },
  { val:'office',emoji:'🏢',label:'Biuro' },
  { val:'travel',emoji:'✈️',label:'Wyjazd' },
  { val:'off',  emoji:'🌴', label:'Wolne' },
];
const STATUS_STORAGE = 'kal_day_statuses';
let dayStatuses = {};

function loadStatuses(){
  try{ dayStatuses=JSON.parse(localStorage.getItem(STATUS_STORAGE))||{}; }catch(e){ dayStatuses={}; }
}
function saveStatuses(){
  localStorage.setItem(STATUS_STORAGE, JSON.stringify(dayStatuses));
}
function cycleStatus(memId, ds){
  const key=`status_${memId}_${ds}`;
  const cur=dayStatuses[key]||'';
  const vals=STATUS_OPTIONS.map(s=>s.val);
  const idx=vals.indexOf(cur);

  if(next==='') delete dayStatuses[key];
  else dayStatuses[key]=next;
  saveStatuses();
  renderWeek();
}

function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

/* ===== DATE UTILS ===== */
function dateStr(y,m,d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function parseDate(s)   { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function toDateStr(dt)  { return dateStr(dt.getFullYear(),dt.getMonth(),dt.getDate()); }
function addDays(dt,n)  { const d=new Date(dt); d.setDate(d.getDate()+n); return d; }
function addMonths(dt,n){ const d=new Date(dt); d.setMonth(d.getMonth()+n); return d; }

function getMondayOf(dt) {
  const d = new Date(dt);
  let dow = d.getDay(); if(dow===0)dow=7;
  d.setDate(d.getDate()-(dow-1));
  return d;
}

/* ===== OCCURRENCE ENGINE ===== */
function getOccurrencesInRange(rangeFromDs, rangeToDs) {
  const RF=parseDate(rangeFromDs), RT=parseDate(rangeToDs);
  const result=[];
  for(const ev of events){
    const evFrom=parseDate(ev.dateFrom);
    const evTo  =ev.dateTo?parseDate(ev.dateTo):evFrom;
    const durMs =evTo-evFrom;
    if(!ev.recurrence){
      if(evFrom<=RT&&evTo>=RF)
        for(const p of ev.persons) result.push({ev,person:p,occFrom:toDateStr(evFrom),occTo:toDateStr(evTo)});
    } else {
      const rec=ev.recurrence;
      let count=0, occ=new Date(evFrom), iter=0;
      while(iter++<3000){
        if(rec.endType==='until'&&rec.endUntil){ if(occ>parseDate(rec.endUntil))break; }
        else { if(count>=(rec.endCount||10))break; }
        const occTo=new Date(occ.getTime()+durMs);
        const matchDay=rec.freq!=='weekly'||!rec.weekdays||rec.weekdays.length===0||rec.weekdays.includes(occ.getDay());
        if(matchDay){
          const occDs=toDateStr(occ);
          // Skip exceptions
          const isException = ev.exceptions && ev.exceptions.includes(occDs);
          if(!isException && occ<=RT&&occTo>=RF){
            // Apply override if exists
            const override = ev.overrides && ev.overrides[occDs];
            const evEff = override ? {...ev, ...override, id:ev.id} : ev;
            const persons = evEff.persons || ev.persons;
            for(const p of persons) result.push({ev:evEff, evBase:ev, person:p, occFrom:occDs, occTo:toDateStr(occTo)});
          }
          count++;
          if(rec.freq==='daily')       occ=addDays(occ,rec.interval||1);
          else if(rec.freq==='weekly') occ=addDays(occ,(rec.interval||1)*7);
          else if(rec.freq==='monthly')occ=addMonths(occ,rec.interval||1);
        } else { occ=addDays(occ,1); }
        if(occ>RT&&matchDay)break;
      }
    }
  }
  return result;
}

function buildIdx(occs, rangeFromDs, rangeToDs){
  const idx={};
  MEMBERS.forEach(m=>idx[m.id]={});
  for(const o of occs){
    let cur=parseDate(o.occFrom);
    const end=parseDate(o.occTo);
    while(cur<=end){
      const ds=toDateStr(cur);
      if(ds>=rangeFromDs&&ds<=rangeToDs){
        if(!idx[o.person][ds])idx[o.person][ds]=[];
        idx[o.person][ds].push(o);
      }
      cur=addDays(cur,1);
    }
  }
  return idx;
}

/* ===== CHIP HTML ===== */
function makeChip(o, ds, cls='event-chip') {
  return makeChipStyled(o, ds, '', cls);
}
function makeChipStyled(o, ds, extraStyle='', cls='event-chip') {
  const isStart = o.occFrom===ds;
  const timeStr = (isStart&&o.ev.time) ? `${o.ev.time}${o.ev.timeEnd?'–'+o.ev.timeEnd:''}` : '';
  const timeHtml = timeStr?`<span class="chip-time">${timeStr}</span>`:'';
  const icon = o.ev.icon ? `${o.ev.icon} ` : '';
  const titleText = icon + o.ev.title;
  const styleAttr = extraStyle ? ` style="${extraStyle}"` : '';
  const intCls = intensityClass(o);
  return `<span class="${cls} ${o.person}${intCls?' '+intCls:''}"${styleAttr} onclick="openPreview(event,'${o.ev.id}','${ds}')" title="${o.ev.note||o.ev.title}">${timeHtml}<span class="chip-title">${titleText}</span></span>`;
}

/* ===== MONTH RENDER ===== */
function renderMonth() {
  document.getElementById('period-label').textContent = MONTH_NAMES[currentMonth]+' '+currentYear;
  document.getElementById('weekdays').style.cssText='position:sticky;top:0;z-index:6;background:var(--bg)';
  document.getElementById('weekdays').innerHTML='<span></span>'+DAY_NAMES.map(d=>`<span>${d}</span>`).join('');

  let startDow=new Date(currentYear,currentMonth,1).getDay();
  startDow=startDow===0?6:startDow-1;
  const dim=new Date(currentYear,currentMonth+1,0).getDate();
  const dipm=new Date(currentYear,currentMonth,0).getDate();
  const total=Math.ceil((startDow+dim)/7)*7;
  const todayStr=toDateStr(new Date());

  const days=[];
  for(let i=0;i<total;i++){
    let d,m,y,om=false;
    if(i<startDow){ d=dipm-startDow+1+i; m=currentMonth-1; y=currentYear; if(m<0){m=11;y--;} om=true; }
    else if(i>=startDow+dim){ d=i-startDow-dim+1; m=currentMonth+1; y=currentYear; if(m>11){m=0;y++;} om=true; }
    else{ d=i-startDow+1; m=currentMonth; y=currentYear; }
    days.push({d,m,y,om,ds:dateStr(y,m,d)});
  }

  const rf=days[0].ds, rt=days[days.length-1].ds;
  const idx=buildIdx(getOccurrencesInRange(rf,rt),rf,rt);
  const weeks=days.length/7;
  let html='';

  for(let w=0;w<weeks;w++){
    const wd=days.slice(w*7,w*7+7);
    // date row
    html+=`<div class="row-label" style="background:var(--surface);min-height:28px;position:sticky;left:0;z-index:4"></div>`;
    wd.forEach(day=>{
      const isToday=day.ds===todayStr;
      const dow=new Date(day.y,day.m,day.d).getDay();
      const isWeekend=dow===0||dow===6;
      const cls=`day-cell date-row${day.om?' other-month':''}${isToday?' today':''}${isWeekend&&!day.om?' weekend':''}`;
      const num=isToday?`<span class="day-num today-num">${day.d}</span>`:`<span class="day-num">${day.d}</span>`;
      html+=`<div class="${cls}">${num}</div>`;
    });

    // Collect all-members event IDs per day
    const allMembersEvIds = {}; // ds -> Set of evIds
    wd.forEach(day=>{
      allMembersEvIds[day.ds] = new Set();
      const firstMemberOccs = idx[MEMBERS[0].id][day.ds]||[];
      firstMemberOccs.forEach(o=>{
        if(MEMBERS.every(m=>(idx[m.id][day.ds]||[]).some(x=>x.ev.id===o.ev.id)))
          allMembersEvIds[day.ds].add(o.ev.id);
      });
    });

    // All-members row (only if any all-member events exist this week)
    const weekHasAllMembers = wd.some(day=>allMembersEvIds[day.ds].size>0);
    if(weekHasAllMembers){
      html+=`<div class="row-label" style="background:var(--grzesiek);color:#fff;font-size:0.55rem;writing-mode:vertical-rl;transform:rotate(180deg);display:flex;align-items:center;justify-content:center;position:sticky;left:0;z-index:4;min-height:40px">Wszyscy</div>`;
      wd.forEach(day=>{
        const isToday=day.ds===todayStr;
        const dow2=new Date(day.y,day.m,day.d).getDay();
        const isWe=!day.om&&(dow2===0||dow2===6);
        const cls=`day-cell${day.om?' other-month':''}${isToday?' today':''}${isWe?' weekend':''}`;
        const cellOccs=(idx[MEMBERS[0].id][day.ds]||[])
          .filter(o=>allMembersEvIds[day.ds].has(o.ev.id))
          .slice().sort((a,b)=>{
            const ta=(a.occFrom===day.ds&&a.ev.time)?a.ev.time:'00:00';
            const tb=(b.occFrom===day.ds&&b.ev.time)?b.ev.time:'00:00';
            return ta.localeCompare(tb);
          });
        const topChips=[],botChips=[];
        for(const o of cellOccs){
          const isMulti=o.occFrom!==o.occTo, isStart=o.occFrom===day.ds, isEnd=o.occTo===day.ds;
          let extraStyle='';
          if(isMulti){
            if(isStart)    extraStyle='border-radius:4px 0 0 4px;margin-right:-5px;padding-right:1px;';
            else if(isEnd) extraStyle='border-radius:0 4px 4px 0;margin-left:-5px;padding-left:1px;';
            else           extraStyle='border-radius:0;margin-left:-5px;margin-right:-5px;padding-left:1px;padding-right:1px;';
          }
          // Use grzesiek color for all-members
          const oAll={...o, person:'grzesiek'};
          const chip=makeChipStyled(oAll,day.ds,extraStyle);
          const isAfternoon=isStart&&o.ev.time&&o.ev.time>='13:00';
          if(isAfternoon)botChips.push(chip); else topChips.push(chip);
        }
        html+=`<div class="${cls}" style="min-height:40px" onclick="openNew('${day.ds}','gosia')">${topChips.join('')}${botChips.length?`<div class="chips-bot">${botChips.join('')}</div>`:''}`;
        html+=`</div>`;
      });
    }

    // Per-member rows (skip all-members events)
    for(const mem of MEMBERS){
      html+=`<div class="row-label ${mem.id}" style="position:sticky;left:0;z-index:4">${mem.label}</div>`;
      wd.forEach(day=>{
        const isToday=day.ds===todayStr;
        const dow2=new Date(day.y,day.m,day.d).getDay();
        const isWe=!day.om&&(dow2===0||dow2===6);
        const cls=`day-cell${day.om?' other-month':''}${isToday?' today':''}${isWe?' weekend':''}`;
        const cellOccs=(idx[mem.id][day.ds]||[])
          .filter(o=>!allMembersEvIds[day.ds].has(o.ev.id))
          .slice().sort((a,b)=>{
            const ta=(a.occFrom===day.ds&&a.ev.time)?a.ev.time:'00:00';
            const tb=(b.occFrom===day.ds&&b.ev.time)?b.ev.time:'00:00';
            return ta.localeCompare(tb);
          });
        const topChips=[],botChips=[];
        for(const o of cellOccs){
          const isMulti=o.occFrom!==o.occTo, isStart=o.occFrom===day.ds, isEnd=o.occTo===day.ds;
          let extraStyle='';
          if(isMulti){
            if(isStart)    extraStyle='border-radius:4px 0 0 4px;margin-right:-5px;padding-right:1px;';
            else if(isEnd) extraStyle='border-radius:0 4px 4px 0;margin-left:-5px;padding-left:1px;';
            else           extraStyle='border-radius:0;margin-left:-5px;margin-right:-5px;padding-left:1px;padding-right:1px;';
          }
          const chip=makeChipStyled(o,day.ds,extraStyle);
          const isAfternoon=isStart&&o.ev.time&&o.ev.time>='13:00';
          if(isAfternoon)botChips.push(chip); else topChips.push(chip);
        }
        const topHtml=`<div class="chips-top">${topChips.join('')}</div>`;
        const botHtml=botChips.length?`<div class="chips-bot">${botChips.join('')}</div>`:'';
        html+=`<div class="${cls}" onclick="openNew('${day.ds}','${mem.id}')">${topHtml}${botHtml}</div>`;
      });
    }
  }
  document.getElementById('cal-grid').innerHTML=html;
}

/* ===== WEEK RENDER ===== */
const WEEK_HOURS = Array.from({length:16},(_,i)=>i+7); // 7–22
const SLOT_H = 52; // px per hour slot
const TIME_W = 46; // px for time label column
const MEM_W  = 80; // px per member sub-column inside a day

function renderWeekStrip() {
  const todayStr  = toDateStr(new Date());
  const monday    = getMondayOf(currentWeekMonday);
  const day0Str   = toDateStr(currentWeekMonday);
  let html = '';
  for(let i=0;i<7;i++){
    const dt  = addDays(monday, i);
    const ds  = toDateStr(dt);
    const dow = (dt.getDay()+6)%7; // 0=Mon ... 6=Sun
    const name= DAY_NAMES[dow];
    const num = dt.getDate();
    const isToday  = ds===todayStr  ? ' is-today' : '';
    const isActive = ds===day0Str   ? ' active'   : '';
    html += `<div class="dws-cell${isActive}${isToday}" onclick="jumpToWeek('${ds}')">`;
    html += `<span class="dws-name">${name}</span>`;
    html += `<span class="dws-num">${num}</span>`;
    html += `</div>`;
  }
  document.getElementById('week-week-strip').innerHTML = html;
}

function jumpToWeek(ds){
  const [y,m,d] = ds.split('-').map(Number);
  currentWeekMonday = new Date(y, m-1, d);
  renderWeek();
}

function renderWeek() {
  const DAYS = 2;
  const day0  = currentWeekMonday;
  const day1  = addDays(day0, DAYS-1);
  const ds0   = toDateStr(day0), ds1 = toDateStr(day1);

  // Period label
  const m0 = MONTH_NAMES[day0.getMonth()], m1 = MONTH_NAMES[day1.getMonth()];
  const label = m0===m1
    ? `${day0.getDate()}–${day1.getDate()} ${m0} ${day0.getFullYear()}`
    : `${day0.getDate()} ${m0} – ${day1.getDate()} ${m1} ${day1.getFullYear()}`;
  document.getElementById('period-label').textContent = label;

  renderWeekStrip();

  const todayStr = toDateStr(new Date());
  const visibleDays = Array.from({length:DAYS},(_,i)=>{
    const dt=addDays(day0,i);
    const dow=(dt.getDay()+6)%7; // 0=Pn...6=Nd
    return {dt, ds:toDateStr(dt), isToday:toDateStr(dt)===todayStr, idx:dow, isWeekend:[0,6].includes(dt.getDay())};
  });

  const idx = buildIdx(getOccurrencesInRange(ds0,ds1), ds0, ds1);

  const TIME_COL = 46;
  const DAY_W    = Math.floor((window.innerWidth - TIME_COL) / DAYS);
  const MEM_W2   = Math.floor(DAY_W / MEMBERS.length);

  // ── TIME COLUMN ──
  let timesHtml='';
  WEEK_HOURS.forEach(hour=>{
    timesHtml+=`<div style="height:${SLOT_H}px;border-bottom:1px solid var(--border);font-size:0.6rem;color:var(--muted);padding:3px 4px 0 0;text-align:right">${String(hour).padStart(2,'0')}:00</div>`;
  });
  document.getElementById('week-times').innerHTML=timesHtml;

  // ── STICKY HEADER ──
  const hasAllDay = visibleDays.some(d=>MEMBERS.some(m=>(idx[m.id][d.ds]||[]).some(o=>!o.ev.time)));
  let sh = `<div style="width:100%;display:flex;flex-direction:column">`;

  // Row 1: day name + date
  sh += `<div style="display:flex;border-bottom:1px solid var(--border);background:var(--surface)">`;
  visibleDays.forEach(d=>{
    const color = d.isToday ? 'var(--gosia)' : 'var(--text)';
    sh += `<div style="flex:1;min-width:0;text-align:center;padding:5px 2px;border-left:2px solid var(--grzesiek);background:${d.isToday?'var(--today-bg)':'var(--surface)'}">`;
    sh += `<div style="font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">${DAY_NAMES[d.idx]}</div>`;
    sh += `<div style="font-size:1.05rem;font-weight:700;color:${color}">${d.dt.getDate()}</div>`;
    sh += `</div>`;
  });
  sh += `</div>`;

  // Row 2: all-day events
  if(hasAllDay){
    sh += `<div style="display:flex;border-bottom:1px solid var(--border);background:#f7f5f1">`;
    visibleDays.forEach(d=>{
      sh += `<div style="flex:1;min-width:0;display:flex;border-left:2px solid #8a8fa8;${d.isToday?'background:var(--today-bg)':''}">`;
      MEMBERS.forEach(mem=>{
        const allDay=(idx[mem.id][d.ds]||[]).filter(o=>!o.ev.time);
        sh += `<div style="flex:1;min-width:0;padding:2px;border-right:1px solid var(--border);min-height:22px" onclick="openNew('${d.ds}','${mem.id}')">`;
        for(const o of allDay) sh+=makeChip(o,d.ds);
        sh += `</div>`;
      });
      sh += `</div>`;
    });
    sh += `</div>`;
  }

  // Row 3: status
  sh += `<div style="display:flex;border-bottom:1px solid var(--border);background:#f0ede6">`;
  visibleDays.forEach(d=>{
    sh += `<div style="flex:1;min-width:0;display:flex;border-left:2px solid #8a8fa8">`;
    MEMBERS.forEach(mem=>{
      const statusKey=`status_${mem.id}_${d.ds}`;
      const status=dayStatuses[statusKey]||'';
      const statusLabel=status?STATUS_OPTIONS.find(s=>s.val===status)?.emoji:'';
      sh += `<div style="flex:1;min-width:0;text-align:center;font-size:0.9rem;padding:2px 0;border-right:1px solid var(--border);cursor:pointer;min-height:22px" onclick="cycleStatus('${mem.id}','${d.ds}')" title="${STATUS_OPTIONS.find(s=>s.val===status)?.label||'Kliknij aby ustawić status'}">${statusLabel}</div>`;
    });
    sh += `</div>`;
  });
  sh += `</div>`;

  // Row 4: member name bars
  sh += `<div style="display:flex;border-bottom:2px solid var(--border);background:var(--surface)">`;
  visibleDays.forEach(d=>{
    sh += `<div style="flex:1;min-width:0;display:flex;border-left:2px solid #8a8fa8">`;
    MEMBERS.forEach(mem=>{
      const colors={gosia:'var(--gosia)',grzesiek:'var(--grzesiek)',adas:'var(--adas)',tymek:'var(--tymek)'};
      const textCol=mem.id==='tymek'?'#5a4a20':'#fff';
      sh += `<div style="flex:1;min-width:0;background:${colors[mem.id]};color:${textCol};font-size:0.6rem;font-weight:600;text-align:center;padding:2px 0;letter-spacing:.06em;text-transform:uppercase;border-right:1px solid rgba(0,0,0,.08);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${mem.label}</div>`;
    });
    sh += `</div>`;
  });
  sh += `</div></div>`;
  document.getElementById('week-sticky').innerHTML=sh;

  // ── SCROLLABLE GRID ──
  let html = `<div style="width:100%;position:relative">`;
  html += `<div style="width:100%;position:relative">`;
  html += `<div style="display:flex;flex-direction:column">`;
  WEEK_HOURS.forEach(hour=>{
    html += `<div style="display:flex;height:${SLOT_H}px;border-bottom:1px solid var(--border)">`;
    visibleDays.forEach(d=>{
      const bg=d.isToday?'background:#fffdf4;':d.isWeekend?'background:var(--weekend-bg);':'';
      html += `<div style="flex:1;min-width:0;display:flex;border-left:2px solid #8a8fa8;${bg}">`;
      MEMBERS.forEach(mem=>{
        html += `<div style="flex:1;min-width:0;border-right:1px solid var(--border);cursor:pointer" onclick="openNew('${d.ds}','${mem.id}',${hour})"></div>`;
      });
      html += `</div>`;
    });
    html += `</div>`;
  });
  html += `</div>`;

  // events added after render via requestAnimationFrame (measured widths)
  html+=`</div>`;
  document.getElementById('week-members').innerHTML=html;

  // Heights + sync vertical scroll
  requestAnimationFrame(()=>{
    const hdrEl  = document.querySelector('header');
    const legEl  = document.querySelector('.legend');
    const stripEl= document.getElementById('week-week-strip');
    const usedH  = (hdrEl?hdrEl.offsetHeight:0)+(legEl?legEl.offsetHeight:0)+(stripEl?stripEl.offsetHeight:0);
    document.getElementById('week-inner').style.height=(window.innerHeight-usedH)+'px';

    const cornerH=document.getElementById('week-sticky').offsetHeight;
    document.getElementById('week-corner').style.height=cornerH+'px';

    // Re-render events with actual measured grid width
    const gridEl = document.getElementById('week-members');
    const actualW = gridEl.clientWidth;
    const realDayW = Math.floor(actualW / DAYS);
    const realMemW = Math.floor(realDayW / MEMBERS.length);

    gridEl.querySelectorAll('.week-event').forEach(el => el.remove());

    const evContainer = gridEl.querySelector('div[style*="position:relative"]');
    if(!evContainer) return;

    const renderedEvIds2 = new Set();
    visibleDays.forEach((d,di)=>{
      const dayLeft2 = di * realDayW;

      // All-members events
      const dayOccs2 = idx[MEMBERS[0].id][d.ds]||[];
      dayOccs2.forEach(o=>{
        if(!o.ev.time) return;
        const allForAll=MEMBERS.every(m=>(idx[m.id][d.ds]||[]).some(x=>x.ev.id===o.ev.id));
        if(!allForAll) return;
        const evKey=d.ds+'|'+o.ev.id;
        if(renderedEvIds2.has(evKey)) return;
        renderedEvIds2.add(evKey);
        const isMultiDay=o.occFrom!==o.occTo, isStart=o.occFrom===d.ds, isEnd=o.occTo===d.ds;
        let topPx,heightPx;
        if(!isMultiDay){
          const [sh2,sm]=o.ev.time.split(':').map(Number);
          if(sh2<7||sh2>22) return;
          topPx=(sh2-7+sm/60)*SLOT_H; heightPx=SLOT_H;
          if(o.ev.timeEnd){const [eh,em]=o.ev.timeEnd.split(':').map(Number);heightPx=Math.max(20,(eh+em/60-sh2-sm/60)*SLOT_H);}
        } else if(isStart){
          const [sh2,sm]=o.ev.time.split(':').map(Number);
          topPx=sh2<7?0:(sh2-7+sm/60)*SLOT_H; heightPx=WEEK_HOURS.length*SLOT_H-topPx;
        } else if(isEnd){
          topPx=0; heightPx=o.ev.timeEnd?(()=>{const [eh,em]=o.ev.timeEnd.split(':').map(Number);return Math.max(20,(eh-7+em/60)*SLOT_H);})():WEEK_HOURS.length*SLOT_H;
        } else { topPx=0; heightPx=WEEK_HOURS.length*SLOT_H; }
        const timeStr=isStart?`${o.ev.time}${o.ev.timeEnd?'–'+o.ev.timeEnd:''}`:'';
        const timeHtml=timeStr?`<span class="chip-time">${timeStr}</span>`:'';
        const el=document.createElement('div');
        el.className=`week-event all-members ${intensityClass(o)}`;
        el.style.cssText=`top:${topPx}px;height:${heightPx}px;left:${dayLeft2+2}px;width:${realDayW-6}px`;
        el.title=o.ev.note||o.ev.title;
        el.innerHTML=`${timeHtml}<span class="chip-title">${(o.ev.icon?o.ev.icon+" ":"")+o.ev.title}</span>`;
        el.onclick=e=>openPreview(e,o.ev.id,d.ds);
        evContainer.appendChild(el);
      });

      // Per-member events
      MEMBERS.forEach((mem,mi)=>{
        const timed2=(idx[mem.id][d.ds]||[]).filter(o=>o.ev.time);
        timed2.forEach(o=>{
          const allForAll=MEMBERS.every(m=>(idx[m.id][d.ds]||[]).some(x=>x.ev.id===o.ev.id));
          if(allForAll) return;
          const isMultiDay=o.occFrom!==o.occTo, isStart=o.occFrom===d.ds, isEnd=o.occTo===d.ds;
          let topPx,heightPx;
          if(!isMultiDay){
            const [sh2,sm]=o.ev.time.split(':').map(Number);
            if(sh2<7||sh2>22) return;
            topPx=(sh2-7+sm/60)*SLOT_H; heightPx=SLOT_H;
            if(o.ev.timeEnd){const [eh,em]=o.ev.timeEnd.split(':').map(Number);heightPx=Math.max(20,(eh+em/60-sh2-sm/60)*SLOT_H);}
          } else if(isStart){
            const [sh2,sm]=o.ev.time.split(':').map(Number);
            topPx=sh2<7?0:(sh2-7+sm/60)*SLOT_H; heightPx=WEEK_HOURS.length*SLOT_H-topPx;
          } else if(isEnd){
            topPx=0; heightPx=o.ev.timeEnd?(()=>{const [eh,em]=o.ev.timeEnd.split(':').map(Number);return Math.max(20,(eh-7+em/60)*SLOT_H);})():WEEK_HOURS.length*SLOT_H;
          } else { topPx=0; heightPx=WEEK_HOURS.length*SLOT_H; }
          const leftPx=dayLeft2+mi*realMemW+2;
          const timeStr=isStart?`${o.ev.time}${o.ev.timeEnd?'–'+o.ev.timeEnd:''}`:'';
          const timeHtml=timeStr?`<span class="chip-time">${timeStr}</span>`:'';
          const el=document.createElement('div');
          el.className=`week-event ${mem.id} ${intensityClass(o)}`;
          el.style.cssText=`top:${topPx}px;height:${heightPx}px;left:${leftPx}px;width:${realMemW-5}px`;
          el.title=o.ev.note||o.ev.title;
          el.innerHTML=`${timeHtml}<span class="chip-title">${(o.ev.icon?o.ev.icon+" ":"")+o.ev.title}</span>`;
          el.onclick=e=>openPreview(e,o.ev.id,d.ds);
          evContainer.appendChild(el);
        });
      });
    });

    // Time indicator for today's column
    const todayDayIdx = visibleDays.findIndex(d=>d.isToday);
    if(todayDayIdx !== -1){
      const now = new Date();
      const h = now.getHours(), m = now.getMinutes();
      if(h >= 7 && h <= 22){
        const topPx = (h - 7 + m/60) * SLOT_H;
        const line = document.createElement('div');
        line.id = 'week-time-indicator';
        line.style.cssText = `position:absolute;top:${topPx}px;left:${todayDayIdx*realDayW}px;width:${realDayW}px;height:2px;background:#e07a5f;z-index:10;pointer-events:none`;
        const dot = document.createElement('div');
        dot.style.cssText = `position:absolute;left:-4px;top:-4px;width:10px;height:10px;border-radius:50%;background:#e07a5f`;
        line.appendChild(dot);
        evContainer.appendChild(line);
      }
    }
  });

  const weekScroll=document.getElementById('week-scroll');
  const weekTimes =document.getElementById('week-times');
  weekScroll.onscroll=function(){ weekTimes.scrollTop=weekScroll.scrollTop; };

  // Auto-scroll to current time if today is visible
  if(visibleDays.some(d=>d.isToday)){
    const now = new Date();
    const scrollTo = Math.max(0, (now.getHours() - 7 - 1) * SLOT_H);
    requestAnimationFrame(()=>{ weekScroll.scrollTop = scrollTo; });
  }

  // Refresh indicator every minute
  clearInterval(window._weekTimeIndicatorTimer);
  window._weekTimeIndicatorTimer = setInterval(()=>{
    const existing = document.getElementById('week-time-indicator');
    if(!existing) return;
    const now = new Date();
    const h = now.getHours(), m = now.getMinutes();
    if(h >= 7 && h <= 22) existing.style.top = ((h-7+m/60)*SLOT_H)+'px';
  }, 60000);
}

function jumpToDay(ds){

}

/* ===== DAY RENDER ===== */
function renderDay(){
  renderDayWeekStrip();
  const ds = toDateStr(currentDay);
  const todayStr = toDateStr(new Date());
  const isToday = ds === todayStr;

  // Label with relative day badge
  const dow = currentDay.getDay();
  const dowName = ['Niedziela','Poniedziałek','Wtorek','Środa','Czwartek','Piątek','Sobota'][dow];
  const todayD = new Date(); todayD.setHours(0,0,0,0);
  const curD   = new Date(currentDay); curD.setHours(0,0,0,0);
  const diffDays = Math.round((curD - todayD) / 86400000);
  const relLabels = { '-1':'D−1', '0':'Dziś', '1':'Jutro', '2':'Pojutrze' };
  const relText = relLabels[String(diffDays)] || (diffDays > 0 ? `D+${diffDays}` : `D${diffDays}`);
  const relCls  = diffDays === 0 ? '' : diffDays > 0 ? ' future' : ' past';
  const relBadge = `<span class="day-rel-label${relCls}">${relText}</span>`;
  document.getElementById('period-label').innerHTML =
    `${dowName}, ${currentDay.getDate()} ${MONTH_NAMES[currentDay.getMonth()]} ${currentDay.getFullYear()}${relBadge}`;

  const idx = buildIdx(getOccurrencesInRange(ds,ds), ds, ds);

  const TIME_COL = 46; // px for time label column
  const MEM_COL_W = Math.floor((window.innerWidth - TIME_COL) / MEMBERS.length);
  const colors = {gosia:'var(--gosia)',grzesiek:'var(--grzesiek)',adas:'var(--adas)',tymek:'var(--tymek)'};
  const gridW2 = MEMBERS.length * MEM_COL_W;
  const hasAllDay = MEMBERS.some(m=>(idx[m.id][ds]||[]).some(o=>!o.ev.time));

  // ── TIME COLUMN ──
  let timesHtml='';
  WEEK_HOURS.forEach(hour=>{
    timesHtml+=`<div style="height:${SLOT_H}px;border-bottom:1px solid var(--border);font-size:0.62rem;color:var(--muted);padding:3px 4px 0 0;text-align:right">${String(hour).padStart(2,'0')}:00</div>`;
  });
  document.getElementById('day-times').innerHTML=timesHtml;

  // ── STICKY HEADER (no TIME_W) ──
  let stickyHtml = `<div style="width:100%;display:flex;flex-direction:column">`;
  stickyHtml += `<div style="display:flex;border-bottom:2px solid var(--border);background:var(--surface)">`;
  MEMBERS.forEach(mem=>{
    const textCol = mem.id==='tymek'?'#5a4a20':'#fff';
    stickyHtml+=`<div style="flex:1;min-width:0;text-align:center;padding:8px 2px;border-left:1px solid var(--border);background:${colors[mem.id]};color:${textCol}">`;
    stickyHtml+=`<div style="font-size:0.85rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${mem.label}</div>`;
    stickyHtml+=`</div>`;
  });
  stickyHtml+=`</div>`;
  if(hasAllDay){
    stickyHtml+=`<div style="display:flex;border-bottom:1px solid var(--border);background:#f7f5f1">`;
    MEMBERS.forEach(mem=>{
      const allDay=(idx[mem.id][ds]||[]).filter(o=>!o.ev.time);
      stickyHtml+=`<div style="flex:1;min-width:0;border-left:1px solid var(--border);padding:2px 4px;min-height:24px" onclick="openNew('${ds}','${mem.id}')">`;
      for(const o of allDay) stickyHtml+=makeChip(o,ds);
      stickyHtml+=`</div>`;
    });
    stickyHtml+=`</div>`;
  }
  stickyHtml+=`</div>`;
  document.getElementById('day-sticky').innerHTML=stickyHtml;

  const isWeekend = [0,6].includes(currentDay.getDay());
  // ── SCROLLABLE GRID (no TIME_W) ──
  let html = `<div style="width:100%;position:relative">`;
  html+=`<div style="display:flex;flex-direction:column">`;
  WEEK_HOURS.forEach(hour=>{
    const bg = isToday ? 'background:#fffdf4;' : isWeekend ? 'background:var(--weekend-bg);' : '';
    html+=`<div style="display:flex;height:${SLOT_H}px;border-bottom:1px solid var(--border)">`;
    MEMBERS.forEach(mem=>{
      html+=`<div style="flex:1;min-width:0;border-left:1px solid var(--border);${bg}cursor:pointer" onclick="openNew('${ds}','${mem.id}',${hour})"></div>`;
    });
    html+=`</div>`;
  });
  html+=`</div>`;
  // events added after render via requestAnimationFrame (measured widths)
  html+=`</div>`;
  document.getElementById('day-content').innerHTML=html;

  // Sync corner height + sync vertical scroll + render events with measured width
  requestAnimationFrame(()=>{
    const h = document.getElementById('day-sticky').offsetHeight;
    document.getElementById('day-corner').style.height = h+'px';
    const hdr   = document.querySelector('header');
    const leg   = document.querySelector('.legend');
    const strip = document.getElementById('day-week-strip');
    const usedH = (hdr ? hdr.offsetHeight : 0) + (leg ? leg.offsetHeight : 0) + (strip ? strip.offsetHeight : 0);
    document.getElementById('day-inner').style.height = (window.innerHeight - usedH) + 'px';

    // Measure actual grid width and render events
    const contentEl = document.getElementById('day-content');
    const actualW   = contentEl.clientWidth;
    const realMemW  = Math.floor(actualW / MEMBERS.length);

    const evContainer = contentEl.querySelector('div[style*="position:relative"]');
    if(!evContainer) return;

    const renderedDayEvIds = new Set();

    // All-members events
    const dayOccs0 = idx[MEMBERS[0].id][ds]||[];
    dayOccs0.forEach(o=>{
      if(!o.ev.time) return;
      const allForAll=MEMBERS.every(m=>(idx[m.id][ds]||[]).some(x=>x.ev.id===o.ev.id));
      if(!allForAll) return;
      if(renderedDayEvIds.has(o.ev.id)) return;
      renderedDayEvIds.add(o.ev.id);
      const isMultiDay=o.occFrom!==o.occTo, isStart=o.occFrom===ds, isEnd=o.occTo===ds;
      let topPx,heightPx;
      if(!isMultiDay){
        const [sh,sm]=o.ev.time.split(':').map(Number);
        if(sh<7||sh>22) return;
        topPx=(sh-7+sm/60)*SLOT_H; heightPx=SLOT_H;
        if(o.ev.timeEnd){const [eh,em]=o.ev.timeEnd.split(':').map(Number);heightPx=Math.max(20,(eh+em/60-sh-sm/60)*SLOT_H);}
      } else if(isStart){
        const [sh,sm]=o.ev.time.split(':').map(Number);
        topPx=sh<7?0:(sh-7+sm/60)*SLOT_H; heightPx=WEEK_HOURS.length*SLOT_H-topPx;
      } else if(isEnd){
        topPx=0; heightPx=o.ev.timeEnd?(()=>{const [eh,em]=o.ev.timeEnd.split(':').map(Number);return Math.max(20,(eh-7+em/60)*SLOT_H);})():WEEK_HOURS.length*SLOT_H;
      } else { topPx=0; heightPx=WEEK_HOURS.length*SLOT_H; }
      const timeStr=isStart?`${o.ev.time}${o.ev.timeEnd?'–'+o.ev.timeEnd:''}`:'';
      const timeHtml=timeStr?`<span class="chip-time">${timeStr}</span>`:'';
      const el=document.createElement('div');
      el.className=`week-event all-members ${intensityClass(o)}`;
      el.style.cssText=`top:${topPx}px;height:${heightPx}px;left:3px;right:3px;width:auto`;
      el.title=o.ev.note||o.ev.title;
      el.innerHTML=`${timeHtml}<span class="chip-title">${(o.ev.icon?o.ev.icon+" ":"")+o.ev.title}</span>`;
      el.onclick=e=>openPreview(e,o.ev.id,ds);
      evContainer.appendChild(el);
    });

    // Per-member events
    MEMBERS.forEach((mem,mi)=>{
      const timed=(idx[mem.id][ds]||[]).filter(o=>o.ev.time);
      timed.forEach(o=>{
        const allForAll=MEMBERS.every(m=>(idx[m.id][ds]||[]).some(x=>x.ev.id===o.ev.id));
        if(allForAll) return;
        const isMultiDay=o.occFrom!==o.occTo, isStart=o.occFrom===ds, isEnd=o.occTo===ds;
        let topPx,heightPx;
        if(!isMultiDay){
          const [sh,sm]=o.ev.time.split(':').map(Number);
          if(sh<7||sh>22) return;
          topPx=(sh-7+sm/60)*SLOT_H; heightPx=SLOT_H;
          if(o.ev.timeEnd){const [eh,em]=o.ev.timeEnd.split(':').map(Number);heightPx=Math.max(20,(eh+em/60-sh-sm/60)*SLOT_H);}
        } else if(isStart){
          const [sh,sm]=o.ev.time.split(':').map(Number);
          topPx=sh<7?0:(sh-7+sm/60)*SLOT_H; heightPx=WEEK_HOURS.length*SLOT_H-topPx;
        } else if(isEnd){
          topPx=0; heightPx=o.ev.timeEnd?(()=>{const [eh,em]=o.ev.timeEnd.split(':').map(Number);return Math.max(20,(eh-7+em/60)*SLOT_H);})():WEEK_HOURS.length*SLOT_H;
        } else { topPx=0; heightPx=WEEK_HOURS.length*SLOT_H; }
        const leftPx=mi*realMemW+3;
        const timeStr=isStart?`${o.ev.time}${o.ev.timeEnd?'–'+o.ev.timeEnd:''}`:'';
        const timeHtml=timeStr?`<span class="chip-time">${timeStr}</span>`:'';
        const el=document.createElement('div');
        el.className=`week-event ${mem.id} ${intensityClass(o)}`;
        el.style.cssText=`top:${topPx}px;height:${heightPx}px;left:${leftPx}px;width:${realMemW-7}px`;
        el.title=o.ev.note||o.ev.title;
        el.innerHTML=`${timeHtml}<span class="chip-title">${(o.ev.icon?o.ev.icon+" ":"")+o.ev.title}</span>`;
        el.onclick=e=>openPreview(e,o.ev.id,ds);
        evContainer.appendChild(el);
      });
    });
  });
  const dayScroll = document.getElementById('day-scroll');
  const dayTimes  = document.getElementById('day-times');
  dayScroll.onscroll = function(){ dayTimes.scrollTop = dayScroll.scrollTop; };

  // ── CURRENT TIME INDICATOR ──
  function updateTimeIndicator(){
    const existing = document.getElementById('day-time-indicator');
    if(existing) existing.remove();
    if(!isToday) return;
    const now = new Date();
    const h = now.getHours(), m = now.getMinutes();
    if(h < 7 || h > 22) return;
    const topPx = (h - 7 + m/60) * SLOT_H;
    const container = document.querySelector('#day-content div[style*="position:relative"]');
    if(!container) return;
    const line = document.createElement('div');
    line.id = 'day-time-indicator';
    line.style.cssText = `position:absolute;top:${topPx}px;left:0;right:0;height:2px;background:#e07a5f;z-index:10;pointer-events:none`;
    const dot = document.createElement('div');
    dot.style.cssText = `position:absolute;left:-4px;top:-4px;width:10px;height:10px;border-radius:50%;background:#e07a5f`;
    line.appendChild(dot);
    container.appendChild(line);
  }

  updateTimeIndicator();
  clearInterval(window._timeIndicatorTimer);
  window._timeIndicatorTimer = setInterval(updateTimeIndicator, 60000);

  // Auto-scroll to current time
  if(isToday){
    const now = new Date();
    const scrollTo = Math.max(0, (now.getHours() - 7 - 1) * SLOT_H);
    requestAnimationFrame(()=>{ dayScroll.scrollTop = scrollTo; });
  }
}

/* ===== SEARCH ===== */
function openSearch(){
  const ov=document.getElementById('search-overlay');
  ov.style.display='block';
  const inp=document.getElementById('search-input');
  inp.value='';
  document.getElementById('search-results').innerHTML='';
  requestAnimationFrame(()=>inp.focus());
}

function closeSearch(){
  document.getElementById('search-overlay').style.display='none';
}

function doSearch(q){
  const res=document.getElementById('search-results');
  q=q.trim().toLowerCase();
  if(!q){ res.innerHTML=''; return; }

  // Collect unique events matching query
  const seen=new Set();
  const matches=[];
  events.forEach(ev=>{
    if(seen.has(ev.id)) return;
    const hay=((ev.title||'')+' '+(ev.note||'')+' '+(ev.icon||'')).toLowerCase();
    if(!hay.includes(q)) return;
    seen.add(ev.id);
    matches.push(ev);
  });

  if(!matches.length){
    res.innerHTML=`<div class="search-empty">Brak wyników dla „${q}"</div>`;
    return;
  }

  // Sort by dateFrom ascending
  matches.sort((a,b)=>a.dateFrom.localeCompare(b.dateFrom));

  const personColors={gosia:'var(--gosia)',grzesiek:'var(--grzesiek)',adas:'var(--adas)',tymek:'var(--tymek)'};
  const personNames={gosia:'Gosia',grzesiek:'Grzesiek',adas:'Adaś',tymek:'Tymek'};
  const monthsShort=['sty','lut','mar','kwi','maj','cze','lip','sie','wrz','paź','lis','gru'];

  res.innerHTML = matches.slice(0,40).map(ev=>{
    const [y,m,d]=ev.dateFrom.split('-').map(Number);
    const dateLabel=`${d} ${monthsShort[m-1]} ${y}`;
    const timeLabel=ev.time?` · ${ev.time}${ev.timeEnd?'–'+ev.timeEnd:''}`:'';
    const persons=Array.isArray(ev.persons)?ev.persons:[ev.persons||'gosia'];
    const dotColor=persons.length===1?personColors[persons[0]]:'var(--grzesiek)';
    const whoLabel=persons.map(p=>personNames[p]||p).join(', ');
    return `<div class="search-result" onclick="searchGoTo('${ev.id}','${ev.dateFrom}')">
      <div class="sr-dot" style="background:${dotColor}"></div>
      <div class="sr-body">
        <div class="sr-title">${ev.icon?ev.icon+' ':''}${ev.title}</div>
        <div class="sr-meta">${dateLabel}${timeLabel} · ${whoLabel}</div>
      </div>
    </div>`;
  }).join('');
}

function searchGoTo(evId, ds){
  closeSearch();
  // Navigate to day view on that date
  const [y,m,d]=ds.split('-').map(Number);
  currentDay=new Date(y,m-1,d);
  setView('day');
  // After render, highlight the event element
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      const els=document.querySelectorAll('#day-content .week-event');
      els.forEach(el=>{
        if(el.onclick && el.onclick.toString().includes(evId)){
          el.classList.add('ev-highlight');
          el.scrollIntoView({block:'center',behavior:'smooth'});
          setTimeout(()=>el.classList.remove('ev-highlight'),1500);
        }
      });
    });
  });
}

// Close on Escape
document.addEventListener('keydown',e=>{
  if(e.key==='Escape' && document.getElementById('search-overlay').style.display!=='none') closeSearch();
});

/* ===== VIEW CONTROL ===== */
function setView(v){
  currentView=v;
  document.getElementById('month-view').classList.toggle('hidden',  v!=='month');
  document.getElementById('week-view').classList.toggle('visible',   v==='week');
  document.getElementById('day-view').classList.toggle('visible',    v==='day');
  document.getElementById('btn-month').classList.toggle('active', v==='month');
  document.getElementById('btn-week').classList.toggle('active',  v==='week');
  document.getElementById('btn-day').classList.toggle('active',   v==='day');
  render();
}

function render(){
  if(currentView==='month')      renderMonth();
  else if(currentView==='week')  renderWeek();
  else                           renderDay();
}

function navigate(d){
  if(currentView==='month'){
    currentMonth+=d;
    if(currentMonth>11){currentMonth=0;currentYear++;}
    if(currentMonth<0) {currentMonth=11;currentYear--;}
  } else if(currentView==='week'){
    currentWeekMonday=addDays(currentWeekMonday,d*1);
  } else {
    currentDay=addDays(currentDay,d);
  }
  render();
}

function goToday(){
  const t=new Date();
  currentYear=t.getFullYear(); currentMonth=t.getMonth();
  currentWeekMonday=getMondayOf(t);
  currentDay=new Date(t.getFullYear(),t.getMonth(),t.getDate());
  render();
}

/* ===== PREVIEW ===== */
let previewEvId = null, previewOccDs = null;

const PERSON_COLORS = {gosia:'var(--gosia)',grzesiek:'var(--grzesiek)',adas:'var(--adas)',tymek:'var(--tymek)'};
const PERSON_LABELS = {gosia:'Gosia',grzesiek:'Grzesiek',adas:'Adaś',tymek:'Tymek'};
const PERSON_TEXT   = {gosia:'#fff',grzesiek:'#fff',adas:'#fff',tymek:'#5a4a20'};

function openPreview(e, evId, occDs){
  e.stopPropagation();
  const evBase = events.find(x=>x.id===evId);
  if(!evBase) return;
  const override = occDs && evBase.overrides && evBase.overrides[occDs];
  const ev = override ? {...evBase,...override,id:evBase.id} : evBase;

  previewEvId = evId;
  previewOccDs = occDs||null;

  document.getElementById('preview-icon').textContent = ev.icon||'';
  document.getElementById('preview-title').textContent = ev.title;

  const personsHtml = (ev.persons||[]).map(p=>
    `<span class="preview-person-dot" style="background:${PERSON_COLORS[p]};color:${PERSON_TEXT[p]}">${PERSON_LABELS[p]}</span>`
  ).join('');
  document.getElementById('preview-persons').innerHTML = personsHtml;

  const rows = [];
  const dateFrom = occDs || ev.dateFrom;
  const dateTo   = occDs ? null : ev.dateTo;
  let dateLabel = formatDatePl(dateFrom);
  if(dateTo) dateLabel += ' – ' + formatDatePl(dateTo);
  rows.push({label:'Data', val:dateLabel});
  if(ev.time){
    let t = ev.time; if(ev.timeEnd) t += ' – '+ev.timeEnd;
    rows.push({label:'Godzina', val:t});
  }
  const impLabels = {normal:'Zwykłe', important:'⭐ Ważne'};
  rows.push({label:'Ważność', val:impLabels[ev.importance||'normal']||'Zwykłe'});
  if(evBase.recurrence) rows.push({label:'Cykliczne', val:recurrenceDesc(evBase.recurrence)});
  if(ev.note) rows.push({label:'Notatka', val:ev.note});

  document.getElementById('preview-body').innerHTML = rows.map(r=>
    `<div class="preview-row"><span class="preview-label">${r.label}</span><span class="preview-val">${r.val}</span></div>`
  ).join('');

  document.getElementById('preview-overlay').classList.add('open');
}

function formatDatePl(ds){
  if(!ds) return '';
  const [y,m,d] = ds.split('-');
  return `${d}.${m}.${y}`;
}

function recurrenceDesc(rec){
  const freqMap = {daily:'codziennie',weekly:'co tydzień',monthly:'co miesiąc'};
  let s = freqMap[rec.freq]||rec.freq;
  if(rec.interval>1) s = `co ${rec.interval} `+({daily:'dni',weekly:'tygodnie',monthly:'miesiące'}[rec.freq]||'');
  if(rec.endType==='count') s += `, ${rec.endCount} razy`;
  else if(rec.endUntil) s += ` do ${formatDatePl(rec.endUntil)}`;
  return s;
}

function closePreview(){
  document.getElementById('preview-overlay').classList.remove('open');
  previewEvId = null; previewOccDs = null;
}

function previewToEdit(){
  const evId = previewEvId, occDs = previewOccDs;
  closePreview();
  const fakeE = {stopPropagation:()=>{}};
  openEdit(fakeE, evId, occDs||undefined);
}

document.getElementById('preview-overlay').addEventListener('click', function(e){
  if(e.target===this) closePreview();
});

// pendingScope: { evId, occDs, action:'edit'|'delete' }
let pendingScope = null;

function openEdit(e, evId, occDs){
  e.stopPropagation();
  const ev = events.find(x=>x.id===evId);
  if(!ev) return;

  if(ev.recurrence){
    // Ask: this occurrence or whole series?
    pendingScope = { evId, occDs, action:'edit' };
    document.getElementById('scope-title').textContent = 'Edytuj wydarzenie';
    document.getElementById('scope-overlay').classList.add('open');
    return;
  }
  openEditForm(evId, null);
}

function scopeChoose(scope){
  document.getElementById('scope-overlay').classList.remove('open');
  if(!pendingScope) return;
  const { evId, occDs, action } = pendingScope;
  pendingScope = null;

  if(action === 'delete'){
    if(scope === 'one'){
      // Add exception date
      const ev = events.find(x=>x.id===evId);
      if(ev){ if(!ev.exceptions)ev.exceptions=[]; if(!ev.exceptions.includes(occDs))ev.exceptions.push(occDs); }
      saveEvents(); closeModal(); render();
    } else {
      // Delete whole series
      events = events.filter(x=>x.id!==evId);
      saveEvents(); closeModal(); render();
    }
    return;
  }

  // edit
  if(scope === 'one'){
    openEditForm(evId, occDs);
  } else {
    openEditForm(evId, null);
  }
}

function scopeCancel(){
  document.getElementById('scope-overlay').classList.remove('open');
  pendingScope = null;
}

// occDs: if set, editing a single occurrence (will create override event)
function openEditForm(evId, occDs){
  const ev = events.find(x=>x.id===evId);
  if(!ev) return;
  editingId = evId;
  editingOccDs = occDs; // null = edit whole series
  resetModal();
  document.getElementById('modal-title').textContent = occDs ? 'Edytuj to wystąpienie' : 'Edytuj wydarzenie';

  // For single occurrence, prefill with override data if exists
  const src = occDs && ev.overrides && ev.overrides[occDs] ? {...ev, ...ev.overrides[occDs]} : ev;

  document.getElementById('ev-title').value = src.title;
  document.getElementById('ev-date-from').value = occDs || src.dateFrom;
  document.getElementById('ev-date-to').value = occDs ? '' : (src.dateTo||'');
  document.getElementById('ev-time').value = src.time||'';
  document.getElementById('ev-time-end').value = src.timeEnd||'';
  document.getElementById('ev-note').value = src.note||'';
  setIcon(src.icon||'');
  setImp(src.importance||'normal');
  setPersons(src.persons||[]);
  document.getElementById('btn-delete').style.display='inline-block';

  if(!occDs && ev.recurrence){
    const rec=ev.recurrence;
    document.getElementById('rec-enabled').checked=true;
    document.getElementById('rec-options').classList.add('visible');
    document.getElementById('rec-freq').value=rec.freq;
    document.getElementById('rec-interval').value=rec.interval||1;
    document.getElementById('rec-end-type').value=rec.endType;
    document.getElementById('rec-end-count').value=rec.endCount||10;
    document.getElementById('rec-end-until').value=rec.endUntil||'';
    onFreqChange(); onEndTypeChange();
    if(rec.freq==='weekly')setWeekdays(rec.weekdays||[]);
  }
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
  editingId=null; editingOccDs=null;
}

let editingOccDs = null;

function saveEvent(){
  const title=document.getElementById('ev-title').value.trim();
  if(!title){document.getElementById('ev-title').focus();return;}
  const persons=getPersons();
  if(!persons.length){alert('Wybierz co najmniej jedną osobę.');return;}
  const dateFrom=document.getElementById('ev-date-from').value;
  if(!dateFrom){document.getElementById('ev-date-from').focus();return;}
  const dateTo=document.getElementById('ev-date-to').value||null;
  const time=document.getElementById('ev-time').value||null;
  const timeEnd=document.getElementById('ev-time-end').value||null;
  const note=document.getElementById('ev-note').value.trim()||null;
  const icon=getIcon()||null;
  const importance=getImp();

  // Editing single occurrence of recurring event
  if(editingId && editingOccDs){
    const ev=events.find(x=>x.id===editingId);
    if(ev){
      if(!ev.overrides) ev.overrides={};
      ev.overrides[editingOccDs]={title,persons,time,timeEnd,note,icon,importance};
    }
    saveEvents(); closeModal(); render();
    return;
  }

  let recurrence=null;
  if(document.getElementById('rec-enabled').checked){
    const freq=document.getElementById('rec-freq').value;
    const interval=Math.max(1,parseInt(document.getElementById('rec-interval').value)||1);
    const endType=document.getElementById('rec-end-type').value;
    const endCount=parseInt(document.getElementById('rec-end-count').value)||10;
    const endUntil=document.getElementById('rec-end-until').value||null;
    const weekdays=freq==='weekly'?getWeekdays():[];
    recurrence={freq,interval,weekdays,endType,endCount,endUntil};
  }

  if(editingId){
    const ev=events.find(x=>x.id===editingId);
    if(ev)Object.assign(ev,{title,persons,dateFrom,dateTo,time,timeEnd,note,icon,importance,recurrence});
  } else {
    events.push({id:uid(),title,persons,dateFrom,dateTo,time,timeEnd,note,icon,importance,recurrence});
  }
  saveEvents(); closeModal(); render();
}

function deleteEvent(){
  if(!editingId) return;
  const ev = events.find(x=>x.id===editingId);
  if(!ev) return;

  if(ev.recurrence && !editingOccDs){
    // Ask scope
    pendingScope = { evId: editingId, occDs: null, action:'delete' };
    document.getElementById('scope-title').textContent = 'Usuń wydarzenie';
    document.getElementById('modal-overlay').classList.remove('open');
    document.getElementById('scope-overlay').classList.add('open');
    return;
  }
  if(ev.recurrence && editingOccDs){
    // Delete just this occurrence
    if(!ev.exceptions) ev.exceptions=[];
    if(!ev.exceptions.includes(editingOccDs)) ev.exceptions.push(editingOccDs);
    saveEvents(); closeModal(); render();
    return;
  }
  if(!confirm('Usunąć to wydarzenie?')) return;
  events=events.filter(x=>x.id!==editingId);
  saveEvents(); closeModal(); render();
}

/* ===== SWIPE (day view + week view) ===== */
(function(){
  function addSwipe(elId){
    let startX=0, startY=0, startT=0;
    const el = document.getElementById(elId);
    el.addEventListener('touchstart', e=>{
      if(e.touches.length!==1) return;
      startX=e.touches[0].clientX;
      startY=e.touches[0].clientY;
      startT=Date.now();
    }, {passive:true});
    el.addEventListener('touchend', e=>{
      if(e.changedTouches.length!==1) return;
      const dx=e.changedTouches[0].clientX-startX;
      const dy=e.changedTouches[0].clientY-startY;
      const dt=Date.now()-startT;
      if(dt<400 && Math.abs(dx)>40 && Math.abs(dx)>Math.abs(dy)*1.5){
        navigate(dx<0 ? 1 : -1);
      }
    }, {passive:true});
  }
  addSwipe('day-view');
  addSwipe('week-view');
})();
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('modal-overlay'))closeModal();});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeModal();
  if(e.key==='Enter'&&document.getElementById('modal-overlay').classList.contains('open')&&!['TEXTAREA','SELECT'].includes(document.activeElement.tagName))saveEvent();
});
